
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HubMovie App - GitHub & Filmes</title>
    <style>
        /* --- ESTILOS GERAIS Y BASE --- */
        :root {
            --bg-color: #0d1117;
            --card-bg: #161b22;
            --text-color: #c9d1d9;
            --text-bright: #f0f6fc;
            --accent-git: #238636;
            --accent-movie: #e50914;
            --border-color: #30363d;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            background-color: var(--card-bg);
            border-bottom: 1px solid var(--border-color);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        header h1 {
            font-size: 1.5rem;
            color: var(--text-bright);
        }

        header h1 span.git { color: #58a6ff; }
        header h1 span.movie { color: var(--accent-movie); }

        nav button {
            background: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-color);
            padding: 0.5rem 1rem;
            margin-left: 0.5rem;
            cursor: pointer;
            border-radius: 6px;
            transition: all 0.3s ease;
            font-weight: 600;
        }

        nav button.active, nav button:hover {
            background-color: var(--border-color);
            color: var(--text-bright);
        }

        main {
            padding: 2rem;
            flex: 1;
            max-width: 1200px;
            width: 100%;
            margin: 0 auto;
        }

        .section {
            display: none;
        }

        .section.active {
            display: block;
        }

        /* --- COMPONENTES COMUNS --- */
        .search-container {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            max-width: 600px;
        }

        input {
            flex: 1;
            background-color: var(--bg-color);
            border: 1px solid var(--border-color);
            color: var(--text-bright);
            padding: 0.75rem 1rem;
            border-radius: 6px;
            font-size: 1rem;
        }

        input:focus {
            outline: none;
            border-color: #58a6ff;
        }

        btn {
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 6px;
            color: var(--text-bright);
            font-weight: bold;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        btn:hover {
            opacity: 0.9;
        }

        .btn-git { background-color: var(--accent-git); }
        .btn-movie { background-color: var(--accent-movie); }

        .error-message {
            color: #f85149;
            margin-top: 1rem;
            display: none;
        }

        /* --- ESTILOS DASHBOARD GITHUB --- */
        .github-profile {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 2rem;
            display: flex;
            gap: 2rem;
            flex-wrap: wrap;
            margin-bottom: 2rem;
        }

        .github-profile img {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            border: 2px solid var(--border-color);
        }

        .profile-info {
            flex: 1;
            min-width: 250px;
        }

        .profile-info h2 { color: var(--text-bright); margin-bottom: 0.5rem; }
        .profile-info p { margin-bottom: 1rem; color: #8b949e; }
        
        .stats {
            display: flex;
            gap: 1.5rem;
            margin-top: 1rem;
        }
        .stat-item {
            background: var(--bg-color);
            padding: 0.5rem 1rem;
            border-radius: 6px;
            border: 1px solid var(--border-color);
            text-align: center;
        }

        .repos-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1rem;
            margin-top: 1.5rem;
        }

        .repo-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .repo-card h3 a {
            color: #58a6ff;
            text-decoration: none;
        }
        .repo-card h3 a:hover { text-decoration: underline; }
        .repo-card p { margin: 0.5rem 0 1rem 0; font-size: 0.9rem; color: #8b949e; }

        /* --- ESTILOS DASHBOARD FILMES --- */
        .movies-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 1.5rem;
        }

        .movie-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            transition: transform 0.2s;
        }

        .movie-card:hover {
            transform: translateY(-5px);
        }

        .movie-card img {
            width: 100%;
            height: 300px;
            object-fit: cover;
            background-color: #0d1117;
        }

        .movie-info {
            padding: 1rem;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            flex: 1;
        }

        .movie-info h3 {
            font-size: 1rem;
            color: var(--text-bright);
            margin-bottom: 0.5rem;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .movie-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.85rem;
        }

        .rating {
            background-color: #21262d;
            padding: 0.2rem 0.5rem;
            border-radius: 4px;
            color: #ffd700;
            font-weight: bold;
        }

        footer {
            text-align: center;
            padding: 1.5rem;
            border-top: 1px solid var(--border-color);
            background-color: var(--card-bg);
            margin-top: auto;
            font-size: 0.9rem;
            color: #8b949e;
        }
    </style>
</head>
<body>

    <header>
        <h1><span class="git">Git</span><span class="movie">Movie</span> Dashboard</h1>
        <nav>
            <button id="nav-git" class="active" onclick="switchTab('github')">GitHub Search</button>
            <button id="nav-movies" onclick="switchTab('movies')">Cinema Finder</button>
        </nav>
    </header>

    <main>
        <section id="sec-github" class="section active">
            <h2>Buscar Desenvolvedor no GitHub</h2>
            <p style="margin-bottom: 1rem; color: #8b949e;">Digite o username para listar dados do perfil e repositórios públicos.</p>
            
            <div class="search-container">
                <input type="text" id="git-input" placeholder="Ex: torvalds" onkeypress="handleGitKey(event)">
                <button class="btn btn-git" onclick="searchGitHub()">Buscar</button>
            </div>
            <div id="git-error" class="error-message">Usuario nao encontrado. Tente novamente.</div>

            <div id="git-result" style="display: none;">
                <div class="github-profile" id="git-profile-box">
                    </div>
                <h3>Repositorios Publicos</h3>
                <div class="repos-grid" id="git-repos-box">
                    </div>
            </div>
        </section>

        <section id="sec-movies" class="section">
            <h2>Descobrir Filmes</h2>
            <p style="margin-bottom: 1rem; color: #8b949e;">Busque por titulos de filmes ou veja os mais populares do momento.</p>
            
            <div class="search-container">
                <input type="text" id="movie-input"
